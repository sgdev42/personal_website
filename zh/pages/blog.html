<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Simon Guo 的博客卡片。" />
    <title>博客 | Simon Guo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600;9..144,800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../assets/css/styles.css" />
    <script src="../../assets/js/main.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="../index.html">SG</a>
      <div class="header-actions">
        <a class="lang-switch" href="../../pages/blog.html">EN</a>
        <button class="menu-toggle" aria-expanded="false" aria-controls="site-nav">
          菜单
        </button>
        <nav id="site-nav" class="site-nav">
          <a href="../index.html">首页</a>
          <a href="./about.html">关于</a>
          <a href="./projects.html">项目</a>
          <a href="./blog.html" aria-current="page">博客</a>
          <a href="./contact.html">联系</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="panel reveal">
        <p class="eyebrow">博客</p>
        <h1>想法卡片</h1>
        <p>把你当下的想法、经验或学习片段快速记录下来。卡片会保存在浏览器里。</p>
      </section>

      <section class="blog-layout reveal">
        <article class="panel">
          <h2>创建卡片</h2>
          <form id="blog-form" class="blog-controls">
            <label for="blog-title">标题</label>
            <input id="blog-title" name="title" type="text" maxlength="80" required />

            <label for="blog-excerpt">内容</label>
            <textarea id="blog-excerpt" name="excerpt" maxlength="400" required></textarea>

            <label for="blog-tags">标签（用逗号分隔）</label>
            <input id="blog-tags" name="tags" type="text" maxlength="120" />

            <button class="button" type="submit">添加卡片</button>
          </form>
        </article>

        <article class="panel">
          <h2>卡片列表</h2>
          <ul id="blog-list" class="blog-list"></ul>
        </article>
      </section>
    </main>

    <footer class="site-footer">
      <small><span id="year"></span> Simon Guo</small>
    </footer>
  </body>
</html>
