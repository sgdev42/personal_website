<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Short blog cards by Simon Guo." />
    <title>Blog | Simon Guo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600;9..144,800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/styles.css" />
    <script src="../assets/js/main.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="../index.html">SG</a>
      <div class="header-actions">
        <a class="lang-switch" href="../zh/pages/blog.html">中文</a>
        <button class="menu-toggle" aria-expanded="false" aria-controls="site-nav">
          Menu
        </button>
        <nav id="site-nav" class="site-nav">
          <a href="../index.html">Home</a>
          <a href="./about.html">About</a>
          <a href="./projects.html">Projects</a>
          <a href="./blog.html" aria-current="page">Blog</a>
          <a href="./contact.html">Contact</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="panel reveal">
        <p class="eyebrow">Blog</p>
        <h1>Thought Cards</h1>
        <p>
          Add short notes whenever you want to capture an idea, lesson, or
          update. Cards are saved in your browser.
        </p>
      </section>

      <section class="blog-layout reveal">
        <article class="panel">
          <h2>Create a Card</h2>
          <form id="blog-form" class="blog-controls">
            <label for="blog-title">Title</label>
            <input id="blog-title" name="title" type="text" maxlength="80" required />

            <label for="blog-excerpt">Thought</label>
            <textarea id="blog-excerpt" name="excerpt" maxlength="400" required></textarea>

            <label for="blog-tags">Tags (comma separated)</label>
            <input id="blog-tags" name="tags" type="text" maxlength="120" />

            <button class="button" type="submit">Add Card</button>
          </form>
        </article>

        <article class="panel">
          <h2>Cards</h2>
          <ul id="blog-list" class="blog-list"></ul>
        </article>
      </section>
    </main>

    <footer class="site-footer">
      <small><span id="year"></span> Simon Guo</small>
    </footer>
  </body>
</html>
